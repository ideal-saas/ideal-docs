<style>
:root {
  --page-width: 816px;
  --page-bg: #f5f5f5;
  --sheet-bg: #ffffff;
  --text-color: #222222;
  --heading-color: #1a3a5c;
  --table-border: #b0b0b0;
  --table-header-bg: #1a3a5c;
  --table-header-text: #ffffff;
  --table-stripe: #f2f6fa;
  --code-bg: #f0f0f0;
  --link-color: #0563c1;
  --toc-bg: #f8f9fb;
  --note-bg: #e8f0fe;
  --note-border: #1a3a5c;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  background: var(--page-bg);
  font-family: Calibri, 'Segoe UI', Candara, sans-serif;
  font-size: 11pt;
  color: var(--text-color);
  line-height: 1.5;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 20px 10px;
}

.sheet {
  background: var(--sheet-bg);
  width: var(--page-width);
  padding: 72pt;
  margin-bottom: 30px;
  box-shadow: 0 1px 4px rgba(0,0,0,0.1), 0 2px 12px rgba(0,0,0,0.08);
  border-radius: 2px;
}

h1 {
  font-size: 20pt;
  color: var(--heading-color);
  text-align: center;
  margin-bottom: 10pt;
}

h2 {
  font-size: 14pt;
  color: var(--heading-color);
  border-bottom: 1.5pt solid var(--heading-color);
  margin-top: 18pt;
  margin-bottom: 8pt;
  padding-bottom: 3pt;
}

h3 {
  font-size: 12pt;
  color: var(--heading-color);
  margin-top: 14pt;
  margin-bottom: 6pt;
}

h4 {
  font-size: 11pt;
  color: var(--heading-color);
  margin-top: 10pt;
  margin-bottom: 4pt;
}

p {
  margin-bottom: 6pt;
  text-align: justify;
}

table {
  width: 100%;
  border-collapse: collapse;
  font-size: 10pt;
  margin: 8pt 0 12pt;
}

table th {
  background: var(--table-header-bg);
  color: var(--table-header-text);
  padding: 5pt 7pt;
  border: 0.5pt solid var(--table-border);
  text-align: left;
  font-weight: bold;
}

table td {
  padding: 4pt 7pt;
  border: 0.5pt solid var(--table-border);
}

table tr:nth-child(even) td {
  background: var(--table-stripe);
}

ul, ol {
  margin: 4pt 0 8pt 20pt;
}

li {
  margin-bottom: 2pt;
}

code {
  font-family: Consolas, monospace;
  font-size: 10pt;
  background: var(--code-bg);
  padding: 1pt 4pt;
  border-radius: 2pt;
}

pre {
  font-family: Consolas, monospace;
  font-size: 9.5pt;
  background: var(--code-bg);
  padding: 8pt 10pt;
  border: 0.5pt solid #d0d0d0;
  overflow-x: auto;
  margin: 8pt 0;
  line-height: 1.4;
  white-space: pre-wrap;
}

.note {
  background: var(--note-bg);
  border-left: 3pt solid var(--note-border);
  padding: 8pt 10pt;
  font-size: 10.5pt;
  margin: 10pt 0;
}

hr {
  border: none;
  border-top: 1pt solid var(--heading-color);
  opacity: 0.5;
  margin: 16pt 0;
}

hr.section-break {
  border-top: 3pt double var(--heading-color);
  opacity: 0.6;
  margin: 20pt 0;
}

.meta {
  text-align: center;
  font-size: 10.5pt;
  color: #555;
  margin-bottom: 8pt;
}

.toc {
  background: var(--toc-bg);
  border: 1pt solid #d0d5dd;
  padding: 14pt 18pt;
  margin: 16pt 0;
}

.toc h2 {
  text-align: center;
  border-bottom: 1pt solid #ccc;
  padding-bottom: 4pt;
  margin-bottom: 10pt;
  font-size: 14pt;
}

.toc ol {
  list-style: none;
  counter-reset: toc-item;
  margin-left: 0;
}

.toc ol ol {
  margin-left: 18pt;
}

.toc li {
  counter-increment: toc-item;
  margin-bottom: 1pt;
  line-height: 1.6;
}

.toc a {
  text-decoration: none;
  color: var(--link-color);
}

.toc .toc-h2 {
  font-weight: bold;
}

.toc .toc-annex {
  font-weight: bold;
  color: var(--heading-color);
  margin-top: 8pt;
}

.page-break {
  page-break-before: always;
  break-before: page;
}

@media print {
  body {
    background: white;
    padding: 0;
  }
  .sheet {
    box-shadow: none;
    width: 100%;
    padding: 0;
    margin: 0;
  }
  .page-break {
    page-break-before: always;
    break-before: page;
  }
  .no-print {
    display: none;
  }
}

.diagram-placeholder {
  border: 2pt dashed #999;
  background: #fafafa;
  padding: 30pt 20pt;
  margin: 14pt 0;
  text-align: center;
  min-height: 200pt;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

.diagram-placeholder .diagram-title {
  font-weight: bold;
  font-size: 12pt;
  color: #444;
  margin-bottom: 6pt;
}

.diagram-placeholder .diagram-instructions {
  font-size: 9.5pt;
  color: #888;
  font-style: italic;
}

.signature-block {
  display: flex;
  justify-content: space-between;
  margin-top: 30pt;
}

.sig {
  text-align: center;
  width: 45%;
}

.sig .sig-line {
  border-top: 1pt solid black;
  width: 80%;
  margin: 40pt auto 8pt;
}

.sig .sig-name {
  font-weight: bold;
}

.sig .sig-title {
  font-size: 10pt;
}

.sig .sig-org {
  font-size: 9.5pt;
  color: #555;
}

.annex-header {
  text-align: center;
  border: 2pt solid var(--heading-color);
  padding: 14pt;
  margin-bottom: 18pt;
}

.annex-header .annex-label {
  font-size: 16pt;
  font-weight: bold;
  color: var(--heading-color);
}

.annex-header .annex-title {
  font-size: 13pt;
}

.check {
  color: #2e7d32;
  font-weight: bold;
}

.table-wrap {
  overflow-x: auto;
}
</style>
</head>
<body>
